    value: database
  github:
    branch: main
    deploy_on_push: true
    repo: jhchan99/signatur
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-0.5gb
  name: queue-worker
  run_command: php artisan queue:work --queue=default --tries=3 --max-time=3600
  source_dir: /
