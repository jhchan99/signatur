alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED
databases:
- cluster_name: signatr-db
  db_name: defaultdb
  db_user: doadmin
  engine: PG
  name: signatr-db
  production: true
  version: "17"
features:
- buildpack-stack=ubuntu-22
ingress:
  rules:
  - component:
      name: signatur
    match:
      authority: {}
      path:
        prefix: /
jobs:
- build_command: composer install --no-dev --optimize-autoloader && npm run build:assets
  environment_slug: php
  envs:
  - key: DB_URL
    scope: RUN_TIME
    value: ${signatr-db.DATABASE_URL}
  - key: DB_CONNECTION
    scope: RUN_TIME
    value: pgsql
  github:
    branch: main
    deploy_on_push: true
    repo: jhchan99/signatur
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-0.5gb
  kind: PRE_DEPLOY
  name: migrate
  run_command: php artisan migrate --force
  source_dir: /
- build_command: composer install --no-dev --optimize-autoloader && npm run build:assets
  environment_slug: php
  envs:
  - key: DB_URL
    scope: RUN_TIME
    value: ${signatr-db.DATABASE_URL}
  - key: DB_CONNECTION
    scope: RUN_TIME
    value: pgsql
  - key: APP_ENV
    scope: RUN_TIME
    value: production
  - key: APP_KEY
    scope: RUN_TIME
    value: base64:3VS7buwMYaz0glfWVslL9u138v0hduBltOsdzwqsLPQ=
  github:
    branch: main
    deploy_on_push: true
    repo: jhchan99/signatur
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-0.5gb
  kind: SCHEDULED
  name: scheduler
  run_command: php artisan schedule:run --no-interaction
  schedule:
    cron: '*/15 * * * *'
    time_zone: UTC
  source_dir: /
name: coral-app
region: nyc
